name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release name (e.g. v1.0.5 or v1.2-rc1)"
        required: true
        type: string
      prerelease:
        description: "Is this a prerelease?"
        required: true
        type: boolean
      custom_message:
        description: "Optional pre-changelog message"
        required: false
        type: string

permissions:
  contents: write

env:
  RELEASE_TITLE: JS Engine - ${{ inputs.tag_name }} Release

jobs:
  ensure-tag:
    name: Create Tag (if needed)
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.pre_changelog_message.outputs.body }}
      tag_name: ${{ steps.tagger.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Set tag name
        id: tagger
        run: echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          TAG="${{ inputs.tag_name }}"

          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git config --global user.name "${{ github.actor }}"
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG."
          fi

      - name: Prepare pre-changelog message
        id: pre_changelog_message
        shell: bash
        run: |
          BODY=""

          if [ -n "${{ inputs.custom_message }}" ]; then
            BODY="${{ inputs.custom_message }}"
            BODY="${BODY}"$'\n\n'
          fi

          {
            echo "body<<EOF"
            printf '%s\n' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Artifacts
    needs: ensure-tag
    uses: ./.github/workflows/main.yml
    with:
      buildFlags: officialBuild

  release-linux:
    name: Release linuxBuild
    needs: [build, ensure-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linuxBuild
          path: build/linux

      - name: Compress build
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          cd build/linux
          zip -r ../../linuxBuild.zip .

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: linuxBuild.zip
          asset_name: FNF-JS-Engine-linux.zip
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true
          overwrite: true

  release-windows:
    name: Release windowsBuild
    needs: [build, ensure-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windowsBuild
          path: build/windows

      - name: Compress build
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          cd build/windows
          zip -r ../../windowsBuild.zip .

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: windowsBuild.zip
          asset_name: FNF-JS-Engine-windows.zip
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true
          overwrite: true

  release-mac:
    name: Release macBuild
    needs: [build, ensure-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-intel
          path: build/mac-intel

      - name: Compress Intel build
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          cd build/mac-intel
          zip -r ../../macBuild-intel.zip .

      - name: Download Mac ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-arm
          path: build/mac-arm

      - name: Compress ARM build
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          cd build/mac-arm
          zip -r ../../macBuild-arm.zip .

      - name: Upload macBuild-intel
        uses: svenstaro/upload-release-action@v2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: macBuild-intel.zip
          asset_name: FNF-JS-Engine-macOS-Intel.zip
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true
          overwrite: true

      - name: Upload macBuild-arm
        uses: svenstaro/upload-release-action@v2.5.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: macBuild-arm.zip
          asset_name: FNF-JS-Engine-macOS-ARM.zip
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true
          overwrite: true
