name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (example: v1.0.5)"
        required: true
        type: string

      prerelease:
        description: "Mark as prerelease"
        required: true
        type: boolean

      custom_message:
        description: "Optional release message"
        required: false
        type: string

permissions:
  contents: write

jobs:
  ensure-tag:
    name: Ensure Git Tag Exists
    runs-on: ubuntu-latest

    outputs:
      body: ${{ steps.release_body.outputs.body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Create tag if missing
        shell: bash
        run: |
          TAG="${{ inputs.tag_name }}"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"

            git tag "$TAG"
            git push origin "$TAG"

            echo "Created tag: $TAG"
          fi

      - name: Build release body
        id: release_body
        shell: bash
        run: |
          BODY=""

          if [ -n "${{ inputs.custom_message }}" ]; then
            BODY="${{ inputs.custom_message }}"
            BODY="${BODY}"$'\n\n'
          fi

          {
            echo "body<<EOF"
            printf '%s\n' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Artifacts
    needs: ensure-tag

    uses: ./.github/workflows/main.yml

    with:
      buildFlags: officialBuild

  release-linux:
    name: Upload Linux Release
    needs: [ensure-tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linuxBuild
          path: release/linux

      - name: Compress Linux build
        shell: bash
        run: |
          cd release/linux
          zip -r ../../FNF-JS-Engine-linux.zip .

      - name: Upload Linux asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: FNF-JS-Engine-linux.zip
          asset_name: FNF-JS-Engine-linux.zip
          overwrite: true
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true

  release-windows:
    name: Upload Windows Release
    needs: [ensure-tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windowsBuild
          path: release/windows

      - name: Compress Windows build
        shell: bash
        run: |
          cd release/windows
          zip -r ../../FNF-JS-Engine-windows.zip .

      - name: Upload Windows asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: FNF-JS-Engine-windows.zip
          asset_name: FNF-JS-Engine-windows.zip
          overwrite: true
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true

  release-mac:
    name: Upload macOS Releases
    needs: [ensure-tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-intel
          path: release/mac-intel

      - name: Compress Intel build
        shell: bash
        run: |
          cd release/mac-intel
          zip -r ../../FNF-JS-Engine-macOS-Intel.zip .

      - name: Download ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: macBuild-arm
          path: release/mac-arm

      - name: Compress ARM build
        shell: bash
        run: |
          cd release/mac-arm
          zip -r ../../FNF-JS-Engine-macOS-ARM.zip .

      - name: Upload Intel asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: FNF-JS-Engine-macOS-Intel.zip
          asset_name: FNF-JS-Engine-macOS-Intel.zip
          overwrite: true
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true

      - name: Upload ARM asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag_name }}
          file: FNF-JS-Engine-macOS-ARM.zip
          asset_name: FNF-JS-Engine-macOS-ARM.zip
          overwrite: true
          draft: true
          prerelease: ${{ inputs.prerelease }}
          body: ${{ needs.ensure-tag.outputs.body }}
          generate_release_notes: true
